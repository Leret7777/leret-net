<!-- NAV -->

  <section class="hero">

      <h1>Shop</h1>
      <p class="lede">Coming soon.</p>
    </div>
  </section>

  <section>
    <div class="wrap">
      <div class="notice-box">
        <p>
          I haven't decided what I'll sell here yet — this page is a
          placeholder until I do. Check back later, or
          <a href="/about.html">get in touch</a> if there's something
          you'd like to see.
        </p>
      </div>

      <!--
        How to wire this up later without restructuring the site:

        This page doesn't need a shopping cart, checkout flow, or backend
        of its own. The simplest path is to embed a hosted checkout
        product directly into this same HTML file:

        - Stripe Payment Links: create a link in the Stripe dashboard for
          each product, then drop a plain <a class="btn" href="...">Buy
          now</a> pointing at it right in this section — Stripe hosts the
          whole checkout page.

        - Gumroad: same idea — create a product on Gumroad, and either
          link to its Gumroad page with a <a>, or use Gumroad's overlay
          embed script for an in-page "Buy" button/popup.

        Either way, this stays a single static page: no server, no
        database, no changes anywhere else in the site — you're just
        replacing this notice-box with product cards/buttons that point
        at Stripe or Gumroad.
      -->
    </div>
  </section>
</main>
