<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leret — Commercial Intelligence Specialist &amp; Model</title>
  <meta name="description" content="Leret — Commercial Intelligence Specialist and model. Systems by day, frames by night. Based in Manchester, UK.">
  <link rel="icon" href="/images/lm-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page">
<!-- NAV -->

<main class="home">
  <!-- HERO: two columns. Left = wordmark + tagline. Right = paper pile. -->
  <section class="home-hero">
    <div class="home-hero__text">
      <p class="eyebrow">Commercial Intelligence Specialist &amp; Model</p>
      <h1 class="wordmark">LERET</h1>
      <p class="tagline">Systems by day, frames by night. Based in Manchester, UK.</p>
      <p class="home-hero__links">
        <a class="mono-link" href="#" id="seeAllPosts">See all posts &rarr;</a>
        <a class="mono-link" href="/about.html">About</a>
      </p>
    </div>

    <!-- The paper pile: build.py fills this with the 3 most recent posts
         as rotated "polaroid" cards. -->
    <div class="home-hero__pile">
      <!-- PAPER_PILE -->
    </div>
  </section>

  <!-- CONTACT STRIP -->
  <section class="contact-strip">
    <p class="eyebrow">Contact</p>
    <a class="contact-strip__email" href="mailto:leretmutkut@gmail.com">leretmutkut@gmail.com</a>
    <p class="contact-strip__links">
      <a class="mono-link" href="#" aria-label="Instagram">Instagram</a>
      <a class="mono-link" href="#" aria-label="LinkedIn">LinkedIn</a>
      <a class="mono-link" href="mailto:francesca@brothermodels.com?subject=Comp%20Card%20Request">Comp card</a>
    </p>
    <p class="contact-strip__copyright">&copy; 2026 Leret. Based in Manchester, UK.</p>
  </section>
</main>

<!-- ALL POSTS overlay: a full-screen panel that fades in when
     "See all posts →" is clicked. It's a normal DOM element (always in
     the page) that script.js shows/hides via the .is-open class — NOT a
     separate page. build.py fills the grid with every post. -->
<div class="overlay" id="allPostsOverlay" aria-hidden="true">
  <div class="overlay__inner">
    <div class="overlay__head">
      <h2 class="overlay__title">All Posts</h2>
      <button class="overlay__close" id="overlayClose" type="button" aria-label="Close">&times;</button>
    </div>
    <div class="overlay__grid">
      <!-- ALL_POSTS_GRID -->
    </div>
  </div>
</div>

<!-- FOOTER -->
<script src="/script.js"></script>
</body>
</html>
