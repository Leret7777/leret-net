<!-- title: Modelling Portfolio | date: 2026-04-22 | tags: modelling | excerpt: Photo gallery and video reel. Represented by Brother Models — comp card requests via the footer. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelling Portfolio — Leret</title>
  <meta name="description" content="Leret's modelling portfolio — photo gallery and video reel. Represented by Brother Models.">
  <link rel="icon" href="/images/lm-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- NAV -->

<main>
  <section class="hero">
    <div class="wrap">
      <p class="post-date">22 April 2026</p>
      <h1>Modelling Portfolio</h1>
      <p class="lede">
        Represented by <strong>Brother Models</strong>. Booking and comp
        card contacts are in the footer of every page. Click any photo
        to enlarge it.
      </p>

      <h2>Portrait</h2>
      <div class="gallery">
        <!-- Each photo is a <button> (not a link) wrapping an <img>, so
             it's keyboard-focusable and clicking doesn't navigate away —
             script.js opens the lightbox instead. data-full can point at
             a larger version of the same image for the enlarged view. -->
        <button class="gallery__item">
          <img src="/images/modeling/portrait/portrait-1.svg" data-full="/images/modeling/portrait/portrait-1.svg" alt="Portrait shoot, image 1 — placeholder">
        </button>
        <button class="gallery__item">
          <img src="/images/modeling/portrait/portrait-2.svg" data-full="/images/modeling/portrait/portrait-2.svg" alt="Portrait shoot, image 2 — placeholder">
        </button>
        <button class="gallery__item">
          <img src="/images/modeling/portrait/portrait-3.svg" data-full="/images/modeling/portrait/portrait-3.svg" alt="Portrait shoot, image 3 — placeholder">
        </button>
      </div>

      <h2>Editorial</h2>
      <div class="gallery">
        <button class="gallery__item">
          <img src="/images/modeling/editorial/editorial-1.svg" data-full="/images/modeling/editorial/editorial-1.svg" alt="Editorial shoot, image 1 — placeholder">
        </button>
        <button class="gallery__item">
          <img src="/images/modeling/editorial/editorial-2.svg" data-full="/images/modeling/editorial/editorial-2.svg" alt="Editorial shoot, image 2 — placeholder">
        </button>
        <button class="gallery__item">
          <img src="/images/modeling/editorial/editorial-3.svg" data-full="/images/modeling/editorial/editorial-3.svg" alt="Editorial shoot, image 3 — placeholder">
        </button>
      </div>

      <h2>Video reel</h2>
      <!-- Responsive 16:9 wrapper — swap the src for a real reel's embed
           URL when ready. No video files are stored in the repo. -->
      <div class="video-embed">
        <iframe
          src="https://www.youtube.com/embed/aqz-KE-bpKQ"
          title="Modeling reel (placeholder)"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

      <h2>Notable shoots</h2>
      <div class="notice-box">
        [Notable shoots or campaigns — to add later]
      </div>
    </div>
  </section>
</main>

<!-- FOOTER -->

<!-- The lightbox overlay: one shared element, reused for every photo.
     Starts hidden; script.js reveals it and fills in the clicked image. -->
<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox__close" aria-label="Close">&times;</button>
  <img id="lightboxImage" src="" alt="">
  <p class="lightbox__caption" id="lightboxCaption"></p>
</div>

<script src="/script.js"></script>
</body>
</html>
