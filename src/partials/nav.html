<!-- id="top" is the anchor the posts' "Back to top" links point at. -->
<header class="site-header" id="top">
  <div class="wrap site-header__inner">
    <a class="site-logo" href="/">
      <img class="site-logo__mark" src="/images/lm-logo.svg" alt="LM">
      <span class="site-logo__name">Leret</span>
    </a>
    <div class="site-header__tools">
      <!-- Collapsed search: only the magnifying glass is visible. The
           input is absolutely positioned to the LEFT of the icon and
           slides out over the header's empty middle space when the
           icon is clicked, so the icon never moves and nothing else
           shifts. script.js handles click, focus, and Escape. -->
      <div class="search-box" id="searchBox">
        <input type="search" class="site-search" id="siteSearch"
               placeholder="Search posts…" aria-label="Search posts" tabindex="-1">
        <button class="icon-btn" id="searchToggle" aria-label="Search" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
        </button>
      </div>
      <!-- The site is one scrolling page: these jump to the #posts and
           #about sections on the homepage. Written as /#... so they work
           from a standalone post page too (go home, then scroll). -->
      <a class="site-header__link" href="/#posts">Posts</a>
      <a class="site-header__link" href="/#about">About</a>
      <!-- Contact icons (Instagram / LinkedIn / email), injected from
           partials/contact-links.html — same markup the post endings
           use, so they're maintained in one place. -->
      <div class="site-header__social">
        <!-- CONTACT_LINKS -->
      </div>
      <!-- Theme toggle: a bare transparent icon like the others;
           script.js fills in the moon/sun SVG for the current theme. -->
      <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
    </div>
  </div>
</header>
