<!-- Newsletter signup box. Injected wherever a page (or the generated
     post ending) contains the NEWSLETTER placeholder.

     Like the book form, this uses Formspree: the form POSTs straight to
     their endpoint and they email you each submission — no server code.
     Create a form at https://formspree.io and replace the placeholder
     ID below with your real endpoint. -->
<div class="newsletter">
  <p class="newsletter__lede">New posts — commercial, modelling, and everything in between — straight to your inbox.</p>
  <form class="newsletter__form" action="https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID" method="POST">
    <input type="text" name="name" placeholder="Your name" aria-label="Your name">
    <input type="email" name="email" placeholder="Your email" aria-label="Your email" required>
    <button type="submit" class="btn">Subscribe</button>
  </form>
  <p class="newsletter__note">Occasional. No spam.</p>
</div>
